name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Check for syntax errors
        working-directory: server
        run: node --check index.js

      - name: Verify migrations directory exists
        working-directory: server
        run: |
          if [ ! -d "migrations" ]; then
            echo "migrations/ directory missing"
            exit 1
          fi
          echo "Found $(ls migrations/ | wc -l) migration files"

      - name: Run npm audit
        working-directory: server
        run: npm audit --audit-level=high
        continue-on-error: true

  
  client:
    name: Client — build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        env:
          VITE_API_URL: https://log-explorer-gbro.onrender.com
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -d "client/dist" ]; then
            echo "Build failed — client/dist missing"
            exit 1
          fi
          echo "Build succeeded — $(du -sh client/dist | cut -f1) output"


  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || 'HEAD~1' }}
          head: ${{ github.sha }}
          extra_args: --only-verified
        continue-on-error: true